<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fancy Hello World</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, #7c3aed, transparent 30%),
                  radial-gradient(circle at bottom right, #06b6d4, transparent 35%),
                  linear-gradient(135deg, #020617, #0f172a 55%, #111827);
      color: white;
      overflow: hidden;
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.08;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    .orb {
      position: absolute;
      width: 280px;
      height: 280px;
      border-radius: 999px;
      filter: blur(10px);
      opacity: 0.6;
      animation: float 8s ease-in-out infinite;
    }

    .orb.one {
      left: 10%;
      top: 15%;
      background: rgba(124, 58, 237, 0.45);
    }

    .orb.two {
      right: 8%;
      bottom: 12%;
      background: rgba(34, 211, 238, 0.35);
      animation-delay: -3s;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0) scale(1);
      }
      50% {
        transform: translateY(-30px) scale(1.08);
      }
    }

    main {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(920px, 100%);
      padding: 56px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 32px;
      background: rgba(15, 23, 42, 0.58);
      box-shadow: 0 30px 100px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(24px);
      text-align: center;
      transform-style: preserve-3d;
      transition: transform 0.2s ease;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      padding: 10px 16px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      color: #c4b5fd;
      background: rgba(255, 255, 255, 0.06);
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .pulse {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #22d3ee;
      box-shadow: 0 0 0 0 rgba(34, 211, 238, 0.7);
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      70% {
        box-shadow: 0 0 0 12px rgba(34, 211, 238, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(34, 211, 238, 0);
      }
    }

    h1 {
      font-size: clamp(3.5rem, 10vw, 8rem);
      line-height: 0.95;
      letter-spacing: -0.08em;
      margin-bottom: 24px;
    }

    .gradient-text {
      background: linear-gradient(90deg, #ffffff, #c4b5fd, #67e8f9, #ffffff);
      background-size: 300%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: shine 5s linear infinite;
    }

    @keyframes shine {
      from {
        background-position: 0%;
      }
      to {
        background-position: 300%;
      }
    }

    p {
      max-width: 620px;
      margin: 0 auto 34px;
      color: #cbd5e1;
      font-size: clamp(1rem, 2vw, 1.25rem);
      line-height: 1.7;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    button, a {
      border: 0;
      border-radius: 999px;
      padding: 14px 22px;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    button {
      color: #020617;
      background: linear-gradient(135deg, #ffffff, #67e8f9);
      box-shadow: 0 12px 35px rgba(34, 211, 238, 0.28);
    }

    a {
      color: white;
      background: rgba(255, 255, 255, 0.09);
      border: 1px solid rgba(255, 255, 255, 0.16);
    }

    button:hover, a:hover {
      transform: translateY(-3px);
    }

    .footer-text {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.45);
      font-size: 13px;
      z-index: 3;
      white-space: nowrap;
    }

    @media (max-width: 640px) {
      .card {
        padding: 36px 24px;
        border-radius: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="orb one"></div>
  <div class="orb two"></div>

  <main>
    <section class="card" id="card">
      <div class="badge">
        <span class="pulse"></span>
        Live on GitHub Pages
      </div>

      <h1><span class="gradient-text">Hello World</span></h1>

      <p>
        A sleek, modern landing page built with pure HTML, CSS, and JavaScript.
        Simple enough for your first website, polished enough to look professional.
      </p>

      <div class="buttons">
        <button id="magicButton">Add some magic</button>
        <a href="https://github.com" target="_blank" rel="noreferrer">View GitHub</a>
      </div>
    </section>
  </main>

  <div class="footer-text">Vibe coded with ChatGPT ✦ Move your mouse — the card follows the light.</div>

  <script>
    const card = document.getElementById("card");
    const magicButton = document.getElementById("magicButton");
    const messages = [
      "Hello World",
      "Welcome In",
      "Built With Style",
      "Made For The Web",
      "Launch Ready"
    ];

    let messageIndex = 0;

    document.addEventListener("mousemove", (event) => {
      const x = (window.innerWidth / 2 - event.clientX) / 35;
      const y = (window.innerHeight / 2 - event.clientY) / 35;

      card.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
    });

    document.addEventListener("mouseleave", () => {
      card.style.transform = "rotateY(0deg) rotateX(0deg)";
    });

    magicButton.addEventListener("click", () => {
      messageIndex = (messageIndex + 1) % messages.length;
      document.querySelector("h1 span").textContent = messages[messageIndex];

      const sparkle = document.createElement("div");
      sparkle.textContent = "✦";
      sparkle.style.position = "fixed";
      sparkle.style.left = Math.random() * window.innerWidth + "px";
      sparkle.style.top = Math.random() * window.innerHeight + "px";
      sparkle.style.fontSize = Math.random() * 28 + 18 + "px";
      sparkle.style.color = "white";
      sparkle.style.pointerEvents = "none";
      sparkle.style.zIndex = "10";
      sparkle.style.animation = "pop 900ms ease forwards";

      document.body.appendChild(sparkle);
      setTimeout(() => sparkle.remove(), 900);
    });

    const style = document.createElement("style");
    style.textContent = `
      @keyframes pop {
        0% { transform: scale(0) rotate(0deg); opacity: 0; }
        40% { opacity: 1; }
        100% { transform: scale(1.8) rotate(160deg); opacity: 0; }
      }
    `;
    document.head.appendChild(style);
  </script>
</body>
</html>
